name: build-test-deploy

on: 
  #push:
  #schedule:
  #  - cron: "*/5 * * * *"
  workflow_dispatch: # manual
   
jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: biblicalendar_app

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

  test:
    needs: build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: biblicalendar_app

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Test app
        run: npm test

      
