name: build-test-deploy

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: biblicalendar_app

    steps:
      - name: checkout repo
        uses: actions/checkout@v5

      - name: use node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - run: npm install
      - run: npm run build
